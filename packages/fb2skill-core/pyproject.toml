[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fb2skill-core"
version = "0.1.0"
description = "Domain logic for converting IEC 61499 FBs into CaSk/CaSkMan skill TTL"
requires-python = ">=3.10"
dependencies = [
    "lxml>=5.0",
    "Jinja2>=3.1",
    "rdflib>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/fb2skill_core"]

[tool.hatch.build.targets.wheel.force-include]
"src/fb2skill_core/templates" = "fb2skill_core/templates"
"src/fb2skill_core/data" = "fb2skill_core/data"

[tool.pytest.ini_options]
testpaths = ["tests"]
